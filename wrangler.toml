# ─────────────────────────────────────────────────────────────────────────────
# Cloudflare Workers configuration — quickfile-mcp
# ─────────────────────────────────────────────────────────────────────────────

name = "quickfile-mcp"
main = "src/index.ts"
compatibility_date = "2026-06-16"

# nodejs_compat enables Node.js APIs in the Workers runtime:
# crypto, process shim, Buffer, EventEmitter — all needed by the MCP SDK.
compatibility_flags = ["nodejs_compat"]

# ── Observability ─────────────────────────────────────────────────────────────
[observability]
enabled = true

# ── Non-secret runtime variables ──────────────────────────────────────────────
# Safe to commit. Not sensitive.
[vars]
LOG_LEVEL = "info"

# ── Optional: VAT-registered business profile ─────────────────────────────────
# Uncomment to enable automatic 20% UK VAT on all invoice/purchase line items.
# When set, AI tools never need to ask about VAT per line item.
#
# QF_VAT_REGISTERED = "true"
# QF_BUSINESS_NAME  = "Ellyfe Ltd"

# ── Optional: Rate limit override ─────────────────────────────────────────────
# Default: 900/day (90% of QuickFile's 1000/day quota).
# Uncomment only if QuickFile has raised your account quota.
#
# RATE_LIMIT_OVERRIDE = "900"

# ── Secrets — NEVER put values here ───────────────────────────────────────────
# Set via Wrangler CLI (encrypted at rest in Cloudflare):
#
#   npx wrangler secret put QF_ACCOUNT_NUMBER
#   npx wrangler secret put QF_API_KEY
#   npx wrangler secret put QF_APP_ID
#
# For local dev: create .dev.vars (gitignored) — see .gitignore.
# DO NOT commit .dev.vars — it contains live API credentials.

# ─────────────────────────────────────────────────────────────
# Cloudflare Workers configuration — quickfile-mcp
# ─────────────────────────────────────────────────────────────

name = "quickfile-mcp"
main = "src/index.ts"
compatibility_date = "2025-06-18"
compatibility_flags = ["nodejs_compat"]

# ── Observability ─────────────────────────────────────────────
[observability]
enabled = true

# ── Non-secret runtime variables ─────────────────────────────
# Safe to commit — not sensitive.
[vars]
LOG_LEVEL = "info"
# RATE_LIMIT_OVERRIDE = "900"
# Uncomment and set to override the default 900 calls/day budget.
# The RateLimiter reads this from env.RATE_LIMIT_OVERRIDE at runtime.
# Useful if QuickFile has increased your API limit above 1000/day.
# Example: RATE_LIMIT_OVERRIDE = "1800"  (for a 2000/day quota at 90%)

# ── Secrets — NEVER put values here ──────────────────────────
# Set automatically by the GitHub Actions deploy workflow via:
#   echo "$VALUE" | npx wrangler secret put SECRET_NAME
#
# Available at runtime as:
#   env.QF_ACCOUNT_NUMBER
#   env.QF_API_KEY
#   env.QF_APP_ID
#
# To set manually (one-off):
#   npx wrangler secret put QF_ACCOUNT_NUMBER
#   npx wrangler secret put QF_API_KEY
#   npx wrangler secret put QF_APP_ID

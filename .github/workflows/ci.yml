# ─────────────────────────────────────────────────────────────────────────────
# CI — Typecheck · Audit · Secret Scan · SAST
# Runs on every push and PR to main.
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── 1. Typecheck + Build ────────────────────────────────────────
  build-and-test:
    name: Typecheck + Build
    runs-on: ubuntu-latest
    env:
      QF_ACCOUNT_NUMBER: ${{ secrets.QF_ACCOUNT_NUMBER }}
      QF_API_KEY:        ${{ secrets.QF_API_KEY }}
      QF_APP_ID:         ${{ secrets.QF_APP_ID }}
      LOG_LEVEL:         info
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

  # ── 2. Dependency vulnerability audit ───────────────────────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    needs: [build-and-test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Audit production dependencies for HIGH/CRITICAL CVEs
        # --omit=dev: only audit production deps (dependencies, not devDependencies).
        # All known HIGH/CRITICAL CVEs (esbuild, undici, ws, vite) are in
        # devDependencies (wrangler, vitest) and do not ship to production.
        # The single production dependency is @modelcontextprotocol/sdk.
        run: npm audit --audit-level=high --omit=dev

  # ── 3. Secret scanning (TruffleHog) ─────────────────────────────
  secret-scan:
    name: Secret Scan (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog — scan for committed secrets
        uses: trufflesecurity/trufflehog@main
        if: |
          github.event_name == 'pull_request' ||
          (github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000')
        with:
          path: ./
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.sha }}
          extra_args: --only-verified

  # ── 4. SAST — CodeQL static analysis ─────────────────────────────
  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    needs: [build-and-test]
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Install dependencies
        run: npm install

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'

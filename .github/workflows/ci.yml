# ─────────────────────────────────────────────────────────────────────────────
# CI — Typecheck · Build · Audit · Secret Scan · SAST
# Runs on every push and PR to main.
#
# Secrets required (GitHub repo → Settings → Secrets → Actions):
#   QF_ACCOUNT_NUMBER   Your QuickFile account number
#   QF_API_KEY          Your QuickFile API key
#   QF_APP_ID           Your QuickFile Application ID
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── 1. Typecheck + Build ───────────────────────────────────────────────────
  # npm install is used instead of npm ci because package-lock.json is not
  # committed to the repo. Once a lockfile is committed, switch to npm ci.
  build-and-test:
    name: Typecheck + Build
    runs-on: ubuntu-latest
    env:
      QF_ACCOUNT_NUMBER: ${{ secrets.QF_ACCOUNT_NUMBER }}
      QF_API_KEY:        ${{ secrets.QF_API_KEY }}
      QF_APP_ID:         ${{ secrets.QF_APP_ID }}
      LOG_LEVEL:         info
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          # cache: 'npm' is intentionally disabled until package-lock.json exists.
          # Re-enable by adding:  cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  # ── 2. Dependency vulnerability audit ─────────────────────────────────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    needs: [build-and-test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Audit for HIGH/CRITICAL CVEs
        run: npm audit --audit-level=high
        # Note: npm audit exits non-zero on HIGH+ CVEs — this blocks the pipeline.
        # To see the full report without failing: npm audit --audit-level=none

  # ── 3. Secret scanning (TruffleHog) ───────────────────────────────────────
  secret-scan:
    name: Secret Scan (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full git history — TruffleHog scans all commits

      - name: TruffleHog — scan for committed secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  # ── 4. SAST — CodeQL static analysis ──────────────────────────────────────
  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    needs: [build-and-test]
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Install dependencies (for CodeQL autobuild)
        run: npm install

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'

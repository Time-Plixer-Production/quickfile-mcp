# ─────────────────────────────────────────────────────────────────────────────
# CI — Typecheck, Test, Build, SAST (CodeQL), Secret Scan (TruffleHog)
# ─────────────────────────────────────────────────────────────────────────────
# Secrets required → GitHub repo Settings → Secrets and variables → Actions:
#   QF_ACCOUNT_NUMBER   → Your QuickFile account number
#   QF_API_KEY          → Your QuickFile API key
#   QF_APP_ID           → Your QuickFile Application ID
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── 1. Typecheck + Test + Build ────────────────────────────────────────────
  build:
    name: Typecheck + Test + Build
    runs-on: ubuntu-latest
    env:
      QF_ACCOUNT_NUMBER: ${{ secrets.QF_ACCOUNT_NUMBER }}
      QF_API_KEY:        ${{ secrets.QF_API_KEY }}
      QF_APP_ID:         ${{ secrets.QF_APP_ID }}
      LOG_LEVEL:         info
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  # ── 2. Dependency vulnerability audit ─────────────────────────────────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      # Fail if any HIGH or CRITICAL CVEs found in dependencies
      - run: npm audit --audit-level=high

  # ── 3. Secret scanning (TruffleHog) ───────────────────────────────────────
  # Scans the entire git history for accidentally committed secrets.
  # Blocks merge if any high-entropy secrets or known patterns are found.
  secret-scan:
    name: Secret Scan (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history — TruffleHog scans all commits
      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  # ── 4. SAST — CodeQL static analysis ──────────────────────────────────────
  # Scans source code for security vulnerabilities:
  #   - Injection flaws
  #   - Insecure randomness
  #   - Path traversal
  #   - Prototype pollution
  #   - Unvalidated inputs
  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'

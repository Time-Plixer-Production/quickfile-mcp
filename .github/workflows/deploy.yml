# ─────────────────────────────────────────────────────────────
# Deploy — Build and deploy to Cloudflare Workers.
# Triggered only AFTER the CI workflow passes on main.
#
# Secrets required (GitHub repo → Settings → Secrets → Actions):
#
#   QuickFile secrets (encrypted into the Worker at deploy time):
#     QF_ACCOUNT_NUMBER   Your QuickFile account number
#     QF_API_KEY          Your QuickFile API key
#     QF_APP_ID           Your QuickFile Application ID
#
#   Cloudflare credentials:
#     CLOUDFLARE_API_TOKEN   From dash.cloudflare.com → Profile → API Tokens
#                            Use the "Edit Cloudflare Workers" template
#     CLOUDFLARE_ACCOUNT_ID  From Cloudflare dashboard sidebar
# ─────────────────────────────────────────────────────────────

name: Deploy to Cloudflare Workers

on:
  # Only deploy when the CI workflow completes successfully on main.
  # This replaces the broken `needs: []` cross-job gate that couldn't
  # reference jobs in a different workflow file.
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    # Gate: only run if the CI workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      # ── Push QuickFile secrets into the Cloudflare Worker ──────────────
      # Secrets are encrypted at rest in Cloudflare and injected at runtime
      # as env.QF_ACCOUNT_NUMBER, env.QF_API_KEY, env.QF_APP_ID.
      - name: Set QF_ACCOUNT_NUMBER secret
        run: echo "$QF_ACCOUNT_NUMBER" | npx wrangler secret put QF_ACCOUNT_NUMBER
        env:
          QF_ACCOUNT_NUMBER:     ${{ secrets.QF_ACCOUNT_NUMBER }}
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set QF_API_KEY secret
        run: echo "$QF_API_KEY" | npx wrangler secret put QF_API_KEY
        env:
          QF_API_KEY:            ${{ secrets.QF_API_KEY }}
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set QF_APP_ID secret
        run: echo "$QF_APP_ID" | npx wrangler secret put QF_APP_ID
        env:
          QF_APP_ID:             ${{ secrets.QF_APP_ID }}
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # ── Deploy ──────────────────────────────────────────────────────────
      - name: Deploy via Wrangler
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
